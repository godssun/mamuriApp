spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: mamuriApp

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000    # 30분 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

ai:
  provider: ${AI_PROVIDER:stub}
  prompt-version: v2
  max-output-tokens: 180
  max-input-chars: 3000
  api:
    url: ${AI_API_URL:https://api.openai.com/v1}
    key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-monthly: ${STRIPE_PRICE_MONTHLY:}
  price-yearly: ${STRIPE_PRICE_YEARLY:}

feature:
  premium-enabled: ${FEATURE_PREMIUM_ENABLED:false}
  quota-enforcement-enabled: ${FEATURE_QUOTA_ENABLED:false}
